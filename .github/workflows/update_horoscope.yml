name: Daily Horoscope Generator

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← this is what was missing

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate horoscopes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python update_horoscope.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add horoscope.json
          [ -f horoscope_yesterday.json ] && git add horoscope_yesterday.json
          git diff --staged --quiet || git commit -m "chore: daily horoscopes $(date -u +%Y-%m-%d)"
          git push